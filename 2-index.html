<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Super Dona 🚀✈️</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
  overflow: hidden;
}

/* ===== TELA INICIAL ===== */
#intro {
  position: fixed;
  inset: 0;
  background: linear-gradient(#020024, #090979, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.rocket-container {
  position: absolute;
  bottom: -200px;
  animation: subir 4s ease-out forwards;
}

@keyframes subir {
  to { bottom: 55%; }
}

.rocket { font-size: 100px; }
.fire {
  font-size: 50px;
  animation: fogo 0.2s infinite alternate;
}

@keyframes fogo {
  from { transform: scaleY(1); }
  to { transform: scaleY(1.3); }
}

.texto {
  opacity: 0;
  animation: aparecer 2s forwards;
  animation-delay: 4s;
  font-size: 48px;
  font-weight: bold;
}

@keyframes aparecer {
  to { opacity: 1; }
}

#entrar {
  margin-top: 30px;
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
  display: none;
}

/* ===== JOGO ===== */
#gameArea {
  display: none;
}

canvas {
  display: block;
  margin: auto;
  border: 2px solid white;
}

#menu {
  position: absolute;
  top: 10px;
  width: 100%;
}
</style>
</head>

<body>

<!-- ===== INTRO ===== -->
<div id="intro">
  <div class="rocket-container">
    <div class="rocket">🚀</div>
    <div class="fire">🔥</div>
  </div>

  <div class="texto">Seja bem-vindo!</div>
  <button id="entrar" onclick="iniciarJogo()">▶️ Entrar no Jogo</button>
</div>

<!-- ===== JOGO ===== -->
<div id="gameArea">
  <div id="menu">
    <h1>✈️ Super Dona</h1>
    Pontos: <span id="score">0</span>
  </div>
  <canvas id="game" width="400" height="500"></canvas>
</div>

<script>
/* ===== INTRO ===== */
setTimeout(() => {
  document.getElementById("entrar").style.display = "block";
}, 6000);

function iniciarJogo(){
  document.getElementById("intro").style.display = "none";
  document.getElementById("gameArea").style.display = "block";
  startGame();
}

/* ===== JOGO ===== */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let aviao, pedras, score, playing;

function startGame(){
  aviao = {x:180,y:420,w:40,h:40};
  pedras = [];
  score = 0;
  playing = true;
  loop();
}

function criarPedra(){
  pedras.push({x:Math.random()*360,y:-30,s:30});
}

function colisao(a,p){
  return a.x<p.x+p.s && a.x+a.w>p.x && a.y<p.y+p.s && a.y+a.h>p.y;
}

document.addEventListener("keydown",e=>{
  if(!playing) return;
  if(e.key==="ArrowLeft") aviao.x-=15;
  if(e.key==="ArrowRight") aviao.x+=15;
});

function loop(){
  if(!playing) return;

  ctx.fillStyle="black";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="white";
  ctx.fillRect(aviao.x,aviao.y,aviao.w,aviao.h);

  pedras.forEach(p=>{
    p.y+=4;
    ctx.beginPath();
    ctx.arc(p.x+p.s/2,p.y+p.s/2,p.s/2,0,2*Math.PI);
    ctx.fill();
    if(colisao(aviao,p)) playing=false;
  });

  pedras = pedras.filter(p=>p.y<canvas.height);

  if(Math.random()<0.03) criarPedra();

  score++;
  document.getElementById("score").innerText = score;

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
