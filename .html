<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olá Mundo 🚀</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(#020024, #090979, #000);
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
  }

  /* Área do foguete */
  .rocket-container {
    position: absolute;
    bottom: -200px;
    animation: subir 4s ease-out forwards;
  }

  @keyframes subir {
    to {
      bottom: 55%;
    }
  }

  /* Foguete */
  .rocket {
    font-size: clamp(60px, 12vw, 120px);
    text-align: center;
  }

  /* Fogo */
  .fire {
    font-size: clamp(30px, 6vw, 60px);
    animation: fogo 0.2s infinite alternate;
  }

  @keyframes fogo {
    from { transform: scaleY(1); }
    to { transform: scaleY(1.3); }
  }

  /* Texto */
  .texto {
    opacity: 0;
    animation: aparecer 2s forwards;
    animation-delay: 4s;
    font-size: clamp(32px, 8vw, 64px);
    font-weight: bold;
    text-align: center;
  }

  @keyframes aparecer {
    to { opacity: 1; }
  }

  .r { color: red; }
  .o { color: orange; }
  .y { color: yellow; }
  .g { color: lime; }
  .c { color: cyan; }
  .b { color: dodgerblue; }
  .v { color: violet; }
</style>
</head>

<body>

  <div class="rocket-container">
    <div class="rocket">🚀</div>
    <div class="fire">🔥</div>
  </div>

  <div class="texto">
    <span
